<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Aloha Escapes</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gloock&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: oklch(0.09 0.015 225);
        --surface: oklch(0.13 0.018 225);
        --primary: oklch(0.63 0.17 18);
        --primary-btn: oklch(0.50 0.17 18);
        --primary-d: oklch(0.44 0.16 18);
        --ink: oklch(0.94 0.008 72);
        --ink-2: oklch(0.76 0.01 72);
        --muted: oklch(0.60 0.012 225);
        --gold: oklch(0.78 0.115 70);
        --border: oklch(0.20 0.018 225);
        --font-d: "Gloock", Georgia, serif;
        --font-b: "Jost", system-ui, sans-serif;
        --wrap: min(1340px, 100% - 3rem);
        --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      body {
        font-family: var(--font-b);
        background: var(--bg);
        color: var(--ink);
        font-size: clamp(1rem, 1.4vw, 1.1rem);
        font-weight: 300;
        line-height: 1.65;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
      }
      a { color: inherit; text-decoration: none; }
      .nav-mini {
        padding: 1.5rem;
        width: var(--wrap);
        margin-inline: auto;
      }
      .nav-mini__logo {
        font-family: var(--font-d);
        font-size: clamp(1.1rem, 1.8vw, 1.35rem);
        color: var(--ink);
        letter-spacing: 0.01em;
      }
      .nav-mini__logo span { color: var(--primary); }
      main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: clamp(4rem, 8vw, 8rem) 1.5rem;
      }
      .err__code {
        font-family: var(--font-d);
        font-size: clamp(5rem, 15vw, 10rem);
        color: var(--gold);
        line-height: 1;
        letter-spacing: -0.04em;
        opacity: 0.85;
      }
      .err__title {
        font-family: var(--font-d);
        font-size: clamp(1.6rem, 3.5vw, 2.5rem);
        color: var(--ink);
        margin-top: 1rem;
        letter-spacing: -0.025em;
        line-height: 1.1;
      }
      .err__sub {
        color: var(--ink-2);
        font-size: clamp(1rem, 1.5vw, 1.15rem);
        font-weight: 300;
        max-width: 44ch;
        margin: 1.25rem auto 2.5rem;
        line-height: 1.65;
      }
      .err__actions {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.9rem 2rem;
        font-family: var(--font-b); font-size: clamp(0.875rem, 1.2vw, 0.975rem);
        font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase;
        border-radius: 3px;
        transition: transform 0.22s var(--ease-expo), background 0.22s, box-shadow 0.22s;
        cursor: pointer;
      }
      .btn:hover { transform: translateY(-2px); }
      .btn-primary { background: var(--primary-btn); color: #fff; border: none; }
      .btn-primary:hover { background: var(--primary-d); box-shadow: 0 12px 32px oklch(0.50 0.17 18 / 0.35); }
      .btn-outline { background: transparent; color: var(--ink); border: 1px solid oklch(0.30 0.018 225); }
      .btn-outline:hover { background: var(--surface); }
      footer {
        padding: 2rem 1.5rem;
        border-top: 1px solid var(--border);
        text-align: center;
      }
      .footer__copy { font-size: clamp(0.72rem, 1vw, 0.82rem); color: var(--muted); }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <nav aria-label="Site navigation">
      <div class="nav-mini">
        <a href="/" class="nav-mini__logo">Aloha<span> Escapes</span></a>
      </div>
    </nav>
    <main>
      <div>
        <p class="err__code" aria-hidden="true">404</p>
        <h1 class="err__title">This page has drifted off course.</h1>
        <p class="err__sub">
          The island you're looking for may have moved — or never existed.
          Let us point you somewhere real.
        </p>
        <div class="err__actions">
          <a href="/" class="btn btn-primary">Return Home</a>
          <a href="/#plan" class="btn btn-outline">Plan a Trip</a>
        </div>
      </div>
    </main>
    <footer>
      <p class="footer__copy">&copy; 2026 Aloha Escapes. All rights reserved.</p>
    </footer>
  </body>
</html>
